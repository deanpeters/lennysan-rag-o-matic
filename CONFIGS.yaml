version: "1.0"

# Defaults for CLI when no flags are provided
defaults:
  provider: "anthropic"
  model: "haiku"
  response_format: "direct_inferred_missing"
  verbose: true

# Provider registry (future‑proof for more APIs)
providers:
  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"
    display_name: "Anthropic"
  openai:
    api_key_env: "OPENAI_API_KEY"
    display_name: "OpenAI"

# Model registry (human‑friendly aliases)
models:
  haiku:
    provider: "anthropic"
    id: "claude-haiku-4-5-20251001"
    label: "Claude Haiku 4.5 (cheapest)"
    status: "active"
  sonnet-4:
    provider: "anthropic"
    id: "claude-sonnet-4-20250514"
    label: "Claude Sonnet 4 (balanced)"
    status: "active"
  gpt-4o-mini:
    provider: "openai"
    id: "gpt-4o-mini"
    label: "GPT-4o mini (cheapest OpenAI)"
    status: "active"
  gpt-4o:
    provider: "openai"
    id: "gpt-4o"
    label: "GPT-4o (quality OpenAI)"
    status: "active"

# Filesystem paths
paths:
  vector_db: "data/chroma_db"
  logs: "logs"
  corpora:
    - name: "lenny"
      path: "episodes"
  topic_index:
    path: "index"
  notebooks:
    root: "notebooks"
    topics_root: "notebooks/topics"

# Retrieval defaults
retrieval:
  # k = how many chunks are passed to the LLM (more context = more cost/noise)
  search_type: "mmr"
  # fetch_k = candidate pool size for MMR (bigger pool = more variety, more cost)
  k: 10
  fetch_k: 30

# Output formatting
output:
  max_sources: 5
  response_format: "direct_inferred_missing"
  deanisms:
    deanifried_response:
      mode: "off"  # on | off
      target_platform: "cli"  # cli | x | linkedin | reddit | substack
  
  

# Corpus pipeline (v1.0)
# fetch_corpus.py pulls transcripts directly from YouTube via yt-dlp
pipeline:
  channel_url: "https://www.youtube.com/@LennysPodcast"
  episodes_dir: "episodes"
  sync_state_file: ".sync_state"
  auto_index_after_fetch: false   # set true to run index_corpus.py automatically
  generate_keywords: true         # uses Haiku to generate keywords (requires ANTHROPIC_API_KEY)
  keyword_model: "claude-haiku-4-5-20251001"
  max_episodes: null              # null = all episodes; set a number to limit (useful for testing)
  whisper_fallback: false         # future: use Whisper if YouTube captions unavailable

# Feature flags (future‑safe, off by default)
features:
  web_search: true
  notebooks: false

# Web search fallback (requires SERPER_API_KEY for api, or Docker/SearXNG for docker)
web_search:
  mode: "on"
  provider: "api"  # api | docker
  endpoint: "https://google.serper.dev/search"
  docker_endpoint: "http://localhost:8080/search"
  allow_api_fallback: false
  api_key_env: "SERPER_API_KEY"
  max_results: 10
  timeout_sec: 10
